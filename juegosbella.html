<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Juegos Bella">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juegos Bella</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Fredoka',sans-serif;overflow:hidden;background:#87CEEB;user-select:none;-webkit-touch-callout:none}
  .hub{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#87CEEB 0%,#B5E8F7 40%,#7CB342 40%,#558B2F 100%);overflow-y:auto;padding:20px 0}

  .welcome{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.2rem,3.5vw,2rem);color:#FFD54F;text-shadow:2px 2px 0 #FF8A65;margin-bottom:4px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .title{font-family:'Bubblegum Sans',cursive;font-size:clamp(2rem,6vw,4rem);color:#fff;text-shadow:4px 4px 0 #FF6B9D,8px 8px 0 #FF8A65;line-height:1.2;text-align:center;animation:bounce 2s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  .subtitle{font-family:'Bubblegum Sans',cursive;font-size:clamp(1rem,2.5vw,1.5rem);color:#fff;text-shadow:2px 2px 0 #66BB6A;margin:12px 0 20px}

  .games{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:860px;width:92%;padding:0 10px}
  .game-card{position:relative;background:#fff;border-radius:24px;padding:22px 16px;text-align:center;cursor:pointer;border:5px solid transparent;box-shadow:0 8px 25px rgba(0,0,0,.12);transition:all .3s cubic-bezier(.34,1.56,.64,1);text-decoration:none;display:flex;flex-direction:column;align-items:center}
  .game-card:hover,.game-card.selected{transform:translateY(-8px) scale(1.03);border-color:#FFD54F;box-shadow:0 12px 35px rgba(0,0,0,.2)}
  .game-card:active{transform:translateY(-2px) scale(.98)}
  .game-icon{font-size:clamp(3rem,7vw,4.5rem);line-height:1;margin-bottom:8px;display:block}
  .game-name{font-family:'Bubblegum Sans',cursive;font-size:clamp(1rem,2.5vw,1.4rem);color:#FF6B9D;margin-bottom:4px}
  .game-desc{font-size:clamp(.75rem,1.8vw,.9rem);color:#888;line-height:1.3}
  .game-num{position:absolute;top:-10px;left:-10px;width:30px;height:30px;background:#FF6B9D;color:#fff;border-radius:50%;font-family:'Bubblegum Sans',cursive;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.2)}

  @media(max-width:600px){
    .games{grid-template-columns:1fr;gap:14px;max-width:320px}
    .game-card{flex-direction:row;padding:16px 20px;gap:14px;text-align:left}
    .game-icon{font-size:3rem;margin-bottom:0;flex-shrink:0}
    .game-info{flex:1}
    .game-name{font-size:1.2rem}
  }

  .deco{position:absolute;font-size:3rem;animation:floaty 3s ease-in-out infinite;pointer-events:none}
  .deco:nth-child(1){top:8%;left:4%;animation-delay:0s}
  .deco:nth-child(2){top:6%;right:5%;animation-delay:.6s}
  .deco:nth-child(3){bottom:28%;left:6%;animation-delay:1.1s}
  .deco:nth-child(4){bottom:24%;right:4%;animation-delay:.3s}
  .deco:nth-child(5){top:20%;left:20%;animation-delay:.8s}
  .deco:nth-child(6){top:16%;right:18%;animation-delay:1.4s}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-15px) rotate(3deg)}}
</style>
</head>
<body>
<div class="hub">
  <span class="deco">🐎</span><span class="deco">🐕</span><span class="deco">🏇</span><span class="deco">🐈</span><span class="deco">🐇</span><span class="deco">🦊</span>

  <div class="welcome">Bienvenida Bella!</div>
  <div class="title">Juegos<br>Bella</div>
  <div class="subtitle">Elige un juego</div>

  <div class="games">
    <a href="animalitos.html" class="game-card" id="game1">
      <span class="game-num">1</span>
      <span class="game-icon">🐎</span>
      <div class="game-info"><div class="game-name">Carrera de Animalitos</div>
      <div class="game-desc">Salta obstaculos con tu animal favorito</div></div>
    </a>
    <a href="caballos.html" class="game-card" id="game2">
      <span class="game-num">2</span>
      <span class="game-icon">🏇</span>
      <div class="game-info"><div class="game-name">Hipodromo</div>
      <div class="game-desc">Carrera de caballos de cuarto de milla</div></div>
    </a>
    <a href="letras.html" class="game-card" id="game3">
      <span class="game-num">3</span>
      <span class="game-icon">🔤</span>
      <div class="game-info"><div class="game-name">Letras y Numeros</div>
      <div class="game-desc">Aprende letras y numeros jugando</div></div>
    </a>
  </div>
</div>
<script>
const cards=document.querySelectorAll('.game-card');
let focus=0;
function selectCard(i){cards.forEach(c=>c.classList.remove('selected'));focus=i;cards[focus].classList.add('selected')}
selectCard(0);
window.addEventListener('keydown',e=>{
  if(e.key==='1'){window.location.href='animalitos.html';return}
  if(e.key==='2'){window.location.href='caballos.html';return}
  if(e.key==='3'){window.location.href='letras.html';return}
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();selectCard((focus+1)%cards.length)}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();selectCard((focus-1+cards.length)%cards.length)}
  if(e.key==='Enter'){e.preventDefault();cards[focus].click()}
});
</script>
</body>
</html>
