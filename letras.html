<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Letras y Numeros - Juego Bella</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Fredoka',sans-serif;overflow:hidden;background:#E8D5F5;user-select:none;touch-action:none;-webkit-touch-callout:none}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s;z-index:10}
  .screen.hidden{opacity:0;pointer-events:none}

  #title-screen{background:linear-gradient(180deg,#E1BEE7 0%,#F8BBD0 50%,#BBDEFB 100%)}
  .title-wrap{text-align:center;animation:bounce 2s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .welcome{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.2rem,3.5vw,1.8rem);color:#FFD54F;text-shadow:2px 2px 0 #CE93D8;margin-bottom:6px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .title{font-family:'Bubblegum Sans',cursive;font-size:clamp(2.5rem,7vw,4.5rem);color:#fff;text-shadow:4px 4px 0 #CE93D8,8px 8px 0 #FF6B9D;line-height:1.2}
  .play-btn{margin-top:24px;padding:14px 44px;font-family:'Bubblegum Sans',cursive;font-size:clamp(1.3rem,4vw,2rem);color:#fff;background:linear-gradient(135deg,#CE93D8,#FF6B9D);border:4px solid #fff;border-radius:50px;cursor:pointer;box-shadow:0 6px 0 #AB47BC;transition:all .15s}
  .play-btn:hover{transform:translateY(-2px)}.play-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #AB47BC}
  .back-btn{position:fixed;top:14px;left:14px;z-index:40;padding:8px 18px;font-family:'Bubblegum Sans',cursive;font-size:1.1rem;color:#fff;background:rgba(0,0,0,.3);border:3px solid rgba(255,255,255,.5);border-radius:25px;cursor:pointer;text-decoration:none;transition:all .15s;backdrop-filter:blur(4px)}
  .back-btn:hover{background:rgba(0,0,0,.5)}

  .deco{position:absolute;font-size:3.5rem;animation:floaty 3s ease-in-out infinite;pointer-events:none}
  .deco:nth-child(1){top:10%;left:5%;animation-delay:0s}
  .deco:nth-child(2){top:8%;right:6%;animation-delay:.6s}
  .deco:nth-child(3){bottom:22%;left:8%;animation-delay:1.1s}
  .deco:nth-child(4){bottom:18%;right:5%;animation-delay:.3s}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-15px) rotate(3deg)}}

  #game-screen{background:linear-gradient(180deg,#E1BEE7,#F8BBD0,#BBDEFB)}
  .game-area{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;width:92%;max-width:600px}

  .prompt{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.4rem,4vw,2.2rem);color:#fff;text-shadow:2px 2px 0 #CE93D8;text-align:center}
  .big-char{font-family:'Bubblegum Sans',cursive;font-size:clamp(6rem,20vw,12rem);color:#fff;text-shadow:6px 6px 0 #CE93D8,12px 12px 0 #FF6B9D;line-height:1;animation:charPop .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes charPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
  .emoji-display{font-size:clamp(3rem,10vw,5rem);text-align:center;margin:8px 0}
  .emoji-name{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.2rem,3.5vw,1.8rem);color:#fff;text-shadow:2px 2px 0 #CE93D8}
  .count-emojis{font-size:clamp(2.5rem,7vw,4rem);text-align:center;letter-spacing:8px;margin:8px 0}

  .options{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;width:100%;max-width:400px}
  .opt-btn{background:#fff;border:5px solid transparent;border-radius:22px;padding:18px 10px;font-family:'Bubblegum Sans',cursive;font-size:clamp(2rem,6vw,3.5rem);color:#7B1FA2;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.1);transition:all .2s cubic-bezier(.34,1.56,.64,1);text-align:center;line-height:1.1}
  .opt-btn:hover{transform:translateY(-4px) scale(1.05);border-color:#FFD54F}
  .opt-btn.selected{border-color:#FFD54F;transform:translateY(-4px) scale(1.05)}
  .opt-btn.correct{background:#66BB6A;color:#fff;border-color:#43A047;transform:scale(1.1)}
  .opt-btn.wrong{background:#EF9A9A;border-color:#EF5350;animation:shake .4s}
  .opt-btn.hint{border-color:#66BB6A;background:#E8F5E9}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  .type-hint{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.1rem,3vw,1.6rem);color:rgba(255,255,255,.8);text-align:center;margin-top:10px}

  .hud{position:fixed;top:14px;right:14px;z-index:20;display:flex;gap:10px;align-items:center}
  .star-count{background:rgba(255,255,255,.9);border-radius:20px;padding:6px 16px;font-family:'Bubblegum Sans',cursive;font-size:1.2rem;color:#FFB300;box-shadow:0 3px 10px rgba(0,0,0,.1)}

  .feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;transition:opacity .3s}
  .feedback.hidden{opacity:0;pointer-events:none}
  .fb-text{font-family:'Bubblegum Sans',cursive;font-size:clamp(3rem,10vw,6rem);color:#fff;text-shadow:4px 4px 0 #66BB6A,8px 8px 0 #43A047;animation:fbPop .6s cubic-bezier(.34,1.56,.64,1) forwards}
  .fb-text.retry{text-shadow:4px 4px 0 #CE93D8,8px 8px 0 #AB47BC;font-size:clamp(1.8rem,5vw,3rem)}
  @keyframes fbPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:0}}

  .confetti{position:fixed;z-index:25;animation:fall linear forwards}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

  .star-particle{position:fixed;z-index:28;pointer-events:none;font-size:2rem;animation:starFloat 1s ease-out forwards}
  @keyframes starFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(0);opacity:0}}
</style>
</head>
<body>
<a href="juegosbella.html" class="back-btn">Volver</a>

<div id="title-screen" class="screen">
  <span class="deco">🔤</span><span class="deco">🔢</span><span class="deco">⭐</span><span class="deco">🌟</span>
  <div class="title-wrap">
    <div class="welcome">Bienvenida Bella!</div>
    <div class="title">Letras y<br>Numeros</div>
    <button class="play-btn" id="playBtn">JUGAR</button>
  </div>
</div>

<div id="game-screen" class="screen hidden">
  <div class="hud"><div class="star-count" id="starCount">⭐ 0</div></div>
  <div class="game-area" id="gameArea"></div>
</div>

<div class="feedback hidden" id="feedback"><div class="fb-text" id="fbText">BIEN!</div></div>

<script>
// === AUDIO ===
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function initAudio(){if(!ac)ac=new AC();if(ac.state==='suspended')ac.resume()}
function tone(f,d,t='sine',v=.1){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function sndCorrect(){tone(523,.1,'sine',.12);setTimeout(()=>tone(659,.1,'sine',.1),80);setTimeout(()=>tone(784,.15,'sine',.1),160)}
function sndWrong(){tone(300,.15,'sine',.06);setTimeout(()=>tone(250,.15,'sine',.05),100)}
function sndClick(){tone(500,.04,'sine',.08)}
function sndCeleb(){[523,659,784,1047,784,1047,1319].forEach((n,i)=>setTimeout(()=>tone(n,.2,'sine',.07),i*120))}

// === SPEECH (for kids who can't read) ===
function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='es-ES';u.rate=.85;u.pitch=1.3;
  // try to find a Spanish voice
  const voices=window.speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang.startsWith('es'));
  if(esVoice)u.voice=esVoice;
  window.speechSynthesis.speak(u);
}
// preload voices
if('speechSynthesis' in window)window.speechSynthesis.getVoices();

// === BACKGROUND MUSIC (gentle music box) ===
let musicPlaying=false,musicTimer=null;
const MELODY=[
  523,587,659,523,0,659,698,784,0,
  784,698,659,587,0,523,587,659,523,0,
  440,494,523,587,0,523,494,440,392,0,
  440,523,494,440,0,392,440,523,0,0,
];
const CHIME=[
  0,0,1047,0,0,0,0,1568,0,
  0,0,1319,0,0,0,0,1047,0,0,
  0,0,0,1175,0,0,0,0,784,0,
  0,1047,0,0,0,0,0,0,0,0,
];
let musicStep=0;
function startMusic(){if(musicPlaying)return;musicPlaying=true;musicStep=0;playMusicStep()}
function playMusicStep(){
  if(!musicPlaying||!ac)return;
  const i=musicStep%MELODY.length;
  const note=MELODY[i],chime=CHIME[i];
  if(note>0)tone(note,.3,'sine',.025);
  if(chime>0)tone(chime,.2,'sine',.012);
  musicStep++;musicTimer=setTimeout(playMusicStep,300);
}
function stopMusic(){musicPlaying=false;if(musicTimer){clearTimeout(musicTimer);musicTimer=null}}

// === DATA ===
const LETTERS=[
  {l:'A',emoji:'🐝',name:'Abeja'},{l:'B',emoji:'🐋',name:'Ballena'},{l:'C',emoji:'🐊',name:'Cocodrilo'},
  {l:'D',emoji:'🐬',name:'Delfin'},{l:'E',emoji:'🐘',name:'Elefante'},{l:'F',emoji:'🦩',name:'Flamenco'},
  {l:'G',emoji:'🐱',name:'Gato'},{l:'H',emoji:'🦛',name:'Hipopotamo'},{l:'I',emoji:'🦎',name:'Iguana'},
  {l:'J',emoji:'🦒',name:'Jirafa'},{l:'K',emoji:'🐨',name:'Koala'},{l:'L',emoji:'🦁',name:'Leon'},
  {l:'M',emoji:'🐒',name:'Mono'},{l:'N',emoji:'🦈',name:'Narval'},{l:'O',emoji:'🐻',name:'Oso'},
  {l:'P',emoji:'🐧',name:'Pinguino'},{l:'Q',emoji:'🧀',name:'Queso'},{l:'R',emoji:'🐸',name:'Rana'},
  {l:'S',emoji:'🐍',name:'Serpiente'},{l:'T',emoji:'🐢',name:'Tortuga'},{l:'U',emoji:'🦄',name:'Unicornio'},
  {l:'V',emoji:'🐄',name:'Vaca'},{l:'W',emoji:'🐺',name:'Wombat'},{l:'X',emoji:'🎸',name:'Xilofono'},
  {l:'Y',emoji:'🦬',name:'Yak'},{l:'Z',emoji:'🦊',name:'Zorro'},
];
const COUNT_EMOJIS=['⭐','❤️','🌸','🦋','🎈'];
const MSGS_OK=['BIEN!','GENIAL!','SUPER!','BRAVO!','PERFECTO!'];
const MSGS_RETRY=['Otra vez!','Intenta!','Casi!'];

// === STATE ===
let stars=0,streak=0,currentRound=null,locked=false,focusIdx=0;

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}

function goPlay(){initAudio();sndClick();show('game-screen');startMusic();nextRound()}
document.getElementById('playBtn').onclick=goPlay;
window._titleKey=e=>{if(e.key==='Enter'){e.preventDefault();goPlay();window.removeEventListener('keydown',window._titleKey)}};
window.addEventListener('keydown',window._titleKey);

// === ROUND GENERATOR ===
function nextRound(){
  locked=false;focusIdx=0;
  const type=Math.random();
  if(type<.35) roundFindChar();
  else if(type<.65) roundAssociate();
  else roundType();
  highlightOpt(0);
}

// --- Round 1: Find the letter/number ---
function roundFindChar(){
  const isNum=Math.random()<.4;
  let target,distractors;
  if(isNum){
    target=String(Math.floor(Math.random()*10)+1);
    distractors=[];
    while(distractors.length<3){
      const d=String(Math.floor(Math.random()*10)+1);
      if(d!==target&&!distractors.includes(d))distractors.push(d);
    }
  } else {
    const item=LETTERS[Math.floor(Math.random()*LETTERS.length)];
    target=item.l;
    distractors=[];
    while(distractors.length<3){
      const d=LETTERS[Math.floor(Math.random()*LETTERS.length)].l;
      if(d!==target&&!distractors.includes(d))distractors.push(d);
    }
  }
  const opts=shuffle([target,...distractors]);
  currentRound={type:'find',answer:target,opts};
  renderFind(target,opts,isNum);
}

// --- Round 2: Associate emoji with initial ---
function roundAssociate(){
  const isNum=Math.random()<.4;
  if(isNum){
    const n=Math.floor(Math.random()*5)+1;
    const emo=COUNT_EMOJIS[Math.floor(Math.random()*COUNT_EMOJIS.length)];
    const display=Array(n).fill(emo).join(' ');
    const answer=String(n);
    const distractors=[];
    while(distractors.length<3){
      const d=String(Math.floor(Math.random()*8)+1);
      if(d!==answer&&!distractors.includes(d))distractors.push(d);
    }
    const opts=shuffle([answer,...distractors]);
    currentRound={type:'assoc',answer,opts};
    renderAssocNum(display,n,opts);
  } else {
    const item=LETTERS[Math.floor(Math.random()*LETTERS.length)];
    const answer=item.l;
    const distractors=[];
    while(distractors.length<3){
      const d=LETTERS[Math.floor(Math.random()*LETTERS.length)].l;
      if(d!==answer&&!distractors.includes(d))distractors.push(d);
    }
    const opts=shuffle([answer,...distractors]);
    currentRound={type:'assoc',answer,opts};
    renderAssocLetter(item,opts);
  }
}

// --- Round 3: Type the character ---
function roundType(){
  const isNum=Math.random()<.4;
  let target;
  if(isNum){
    target=String(Math.floor(Math.random()*10)+1);
  } else {
    target=LETTERS[Math.floor(Math.random()*LETTERS.length)].l;
  }
  // on touch devices show options instead of requiring keyboard
  const isTouch='ontouchstart' in window && !window.matchMedia('(pointer:fine)').matches;
  if(isTouch){
    const distractors=[];
    if(isNum){
      while(distractors.length<3){const d=String(Math.floor(Math.random()*10)+1);if(d!==target&&!distractors.includes(d))distractors.push(d)}
    } else {
      while(distractors.length<3){const d=LETTERS[Math.floor(Math.random()*LETTERS.length)].l;if(d!==target&&!distractors.includes(d))distractors.push(d)}
    }
    const opts=shuffle([target,...distractors]);
    currentRound={type:'find',answer:target,opts};
    renderType(target,opts,true);
  } else {
    currentRound={type:'type',answer:target,opts:null};
    renderType(target,null,false);
  }
}

// === RENDERERS ===
function renderFind(target,opts,isNum){
  const area=document.getElementById('gameArea');
  area.innerHTML=`
    <div class="prompt">${isNum?'Encuentra el numero':'Encuentra la letra'}</div>
    <div class="big-char">${target}</div>
    <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
  `;
  bindOpts();
  speak(isNum?'Encuentra el numero '+target:'Encuentra la letra '+target);
}

function renderAssocLetter(item,opts){
  const area=document.getElementById('gameArea');
  area.innerHTML=`
    <div class="prompt">Cual es la primera letra?</div>
    <div class="emoji-display">${item.emoji}</div>
    <div class="emoji-name">${item.name}</div>
    <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
  `;
  bindOpts();
  speak(item.name+'. Cual es la primera letra de '+item.name+'?');
}

function renderAssocNum(display,n,opts){
  const area=document.getElementById('gameArea');
  area.innerHTML=`
    <div class="prompt">Cuantos hay?</div>
    <div class="count-emojis">${display}</div>
    <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
  `;
  bindOpts();
  speak('Cuantos hay?');
}

function renderType(target,opts,touchMode){
  const area=document.getElementById('gameArea');
  const isNum=target.match(/[0-9]/);
  if(touchMode){
    area.innerHTML=`
      <div class="prompt">Toca la correcta</div>
      <div class="big-char">${target}</div>
      <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
    `;
    bindOpts();
  } else {
    area.innerHTML=`
      <div class="prompt">Presiona esta tecla!</div>
      <div class="big-char">${target}</div>
      <div class="type-hint">Usa el teclado</div>
    `;
  }
  speak(isNum?'Presiona el numero '+target:'Presiona la letra '+target);
}

// === OPTION BINDING ===
function bindOpts(){
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.onclick=()=>checkAnswer(btn.dataset.val,parseInt(btn.dataset.idx));
  });
}

function highlightOpt(i){
  const btns=document.querySelectorAll('.opt-btn');
  if(!btns.length)return;
  focusIdx=((i%btns.length)+btns.length)%btns.length;
  btns.forEach((b,j)=>b.classList.toggle('selected',j===focusIdx));
}

function checkAnswer(val,idx){
  if(locked)return;
  const btn=document.querySelectorAll('.opt-btn')[idx];
  if(val===currentRound.answer){
    locked=true;
    btn.classList.add('correct');
    sndCorrect();
    stars++;streak++;
    document.getElementById('starCount').textContent='⭐ '+stars;
    showFeedback(MSGS_OK[Math.floor(Math.random()*MSGS_OK.length)],false);
    spawnStars(btn);
    if(streak%5===0)spawnConf();
    setTimeout(nextRound,1200);
  } else {
    btn.classList.add('wrong');
    sndWrong();
    streak=0;
    showFeedback(MSGS_RETRY[Math.floor(Math.random()*MSGS_RETRY.length)],true);
    // highlight correct answer
    setTimeout(()=>{
      btn.classList.remove('wrong');
      document.querySelectorAll('.opt-btn').forEach(b=>{
        if(b.dataset.val===currentRound.answer)b.classList.add('hint');
      });
    },500);
  }
}

// === TYPE MODE KEY HANDLER ===
window.addEventListener('keydown',e=>{
  if(locked)return;
  // game screen navigation
  const btns=document.querySelectorAll('.opt-btn');

  if(currentRound&&currentRound.type==='type'&&!currentRound.opts){
    // direct key input mode
    const key=e.key.toUpperCase();
    if(key===currentRound.answer){
      locked=true;sndCorrect();stars++;streak++;
      document.getElementById('starCount').textContent='⭐ '+stars;
      showFeedback(MSGS_OK[Math.floor(Math.random()*MSGS_OK.length)],false);
      if(streak%5===0)spawnConf();
      // flash the big char green
      const bc=document.querySelector('.big-char');
      if(bc)bc.style.color='#66BB6A';
      setTimeout(nextRound,1200);
    } else if(key.length===1&&key.match(/[A-Z0-9]/)){
      sndWrong();streak=0;
      showFeedback(MSGS_RETRY[Math.floor(Math.random()*MSGS_RETRY.length)],true);
    }
    return;
  }

  // arrow navigation for option buttons
  if(btns.length){
    if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();highlightOpt(focusIdx+1)}
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();highlightOpt(focusIdx-1)}
    if(e.key==='Enter'){e.preventDefault();const b=btns[focusIdx];if(b)checkAnswer(b.dataset.val,focusIdx)}
    // direct letter/number press to select matching option
    const key=e.key.toUpperCase();
    btns.forEach((b,i)=>{if(b.dataset.val===key)checkAnswer(key,i)});
  }
});

// === FEEDBACK ===
let fbTimer=null;
function showFeedback(msg,isRetry){
  const fb=document.getElementById('feedback');
  const txt=document.getElementById('fbText');
  if(fbTimer)clearTimeout(fbTimer);
  txt.textContent=msg;
  txt.className='fb-text'+(isRetry?' retry':'');
  fb.classList.remove('hidden');
  txt.style.animation='none';void txt.offsetWidth;txt.style.animation='fbPop .6s cubic-bezier(.34,1.56,.64,1) forwards';
  fbTimer=setTimeout(()=>{fb.classList.add('hidden');fbTimer=null},isRetry?700:900);
  speak(isRetry?'Intenta otra vez':msg);
}

function spawnStars(btn){
  const rect=btn.getBoundingClientRect();
  for(let i=0;i<5;i++){
    const s=document.createElement('div');s.className='star-particle';
    s.textContent='⭐';
    s.style.left=(rect.left+rect.width/2-16+Math.random()*40-20)+'px';
    s.style.top=(rect.top-10)+'px';
    s.style.animationDelay=(i*.08)+'s';
    document.body.appendChild(s);setTimeout(()=>s.remove(),1200);
  }
}

function spawnConf(){
  sndCeleb();
  const cols=['#FF6B9D','#FFD54F','#4FC3F7','#66BB6A','#CE93D8','#FF8A65','#EF5350'];
  for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confetti';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;background:${cols[i%7]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),6000)}
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
</script>
