  .word-gap{border-bottom:5px solid #FFD54F;color:#FFD54F;animation:pulse 1s ease-in-out infinite}

  .star-count{background:rgba(255,255,255,.9);border-radius:20px;padding:6px 16px;font-family:'Bubblegum Sans',cursive;font-size:1.2rem;color:#FFB300;box-shadow:0 3px 10px rgba(0,0,0,.1)}

<script>
// === AUDIO ===
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function initAudio(){if(!ac)ac=new AC();if(ac.state==='suspended')ac.resume()}
function tone(f,d,t='sine',v=.1){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function sndCorrect(){tone(523,.1,'sine',.12);setTimeout(()=>tone(659,.1,'sine',.1),80);setTimeout(()=>tone(784,.15,'sine',.1),160)}
function sndWrong(){tone(300,.15,'sine',.06);setTimeout(()=>tone(250,.15,'sine',.05),100)}
function sndClick(){tone(500,.04,'sine',.08)}
function sndCeleb(){[523,659,784,1047,784,1047,1319].forEach((n,i)=>setTimeout(()=>tone(n,.2,'sine',.07),i*120))}

// === SPEECH (Amazon Polly via proxy + Web Speech API fallback) ===
let ttsOk=true,activeTTSAudios=[],cachedVoice=null;
function scoreVoice(v){
  let s=0;const name=(v.name||'').toLowerCase(),lang=v.lang||'',uri=(v.voiceURI||'').toLowerCase();
  if(!lang.startsWith('es'))return -1;
  if(/premium|enhanced|neural|natural|siri|online/i.test(name)||/ttsbundle/i.test(uri))s+=100;
  if(/compact/i.test(uri))s-=30;
  if(/es[-_](MX|US|419)/i.test(lang))s+=60;else if(/es[-_](CO|AR|CL|PE|VE)/i.test(lang))s+=50;else if(/es[-_]ES/i.test(lang))s+=5;else s+=20;
  if(/female|paulina|penelope|elena|karla|angelica|jimena|monica|sofia|dalia|paloma|mia|lupe|lucia/i.test(name))s+=30;
  return s;
}
function pickVoice(){
  if(cachedVoice)return cachedVoice;
  const voices=window.speechSynthesis.getVoices();if(!voices.length)return null;
  let best=null,bs=-1;for(const v of voices){const s=scoreVoice(v);if(s>bs){bs=s;best=v}}
  if(best)cachedVoice=best;return cachedVoice;
}
function stopSpeech(){
  activeTTSAudios.forEach(a=>{a.pause();a.src=''});
  activeTTSAudios=[];
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
}
function speakLocal(text){
  if(!('speechSynthesis' in window))return;
  const u=new SpeechSynthesisUtterance(text);u.lang='es-MX';u.rate=.85;u.pitch=1.1;
  const v=pickVoice();if(v){u.voice=v;if(/premium|enhanced|neural|siri/i.test(v.name)){u.pitch=1.05;u.rate=.9}}
  window.speechSynthesis.speak(u);
}
function speak(text){
  if(ttsOk){
    fetch('/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voice:'Mia',text:text,service:'polly'})})
    .then(r=>r.json()).then(d=>{
      if(d.success&&d.speak_url){
        const audio=new Audio(d.speak_url);
        activeTTSAudios.push(audio);
        audio.onended=()=>{activeTTSAudios=activeTTSAudios.filter(a=>a!==audio)};
        audio.play();
      }
      else throw 0;
    }).catch(()=>{ttsOk=false;speakLocal(text)});
    return;
  }
  speakLocal(text);
}
if('speechSynthesis' in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>{cachedVoice=null;pickVoice()}}

// === BACKGROUND MUSIC (MP3 - "Carefree" Kevin MacLeod, CC BY 4.0) ===
let musicAudio=null;
function startMusic(){
  if(musicAudio)return;
  musicAudio=new Audio('music/calm.mp3');
  musicAudio.loop=true;musicAudio.volume=0.18;
  musicAudio.play().catch(function(){});
}
function stopMusic(){if(musicAudio){musicAudio.pause();musicAudio.currentTime=0;musicAudio=null;}}

// === DATA ===
const LETTERS=[
  {l:'A',emoji:'🐝',name:'Abeja'},{l:'B',emoji:'🐋',name:'Ballena'},{l:'C',emoji:'🐊',name:'Cocodrilo'},
  {l:'D',emoji:'🐬',name:'Delfin'},{l:'E',emoji:'🐘',name:'Elefante'},{l:'F',emoji:'🦩',name:'Flamenco'},

  {l:'M',emoji:'🐒',name:'Mono'},{l:'N',emoji:'🦈',name:'Narval'},{l:'O',emoji:'🐻',name:'Oso'},
  {l:'P',emoji:'🐧',name:'Pinguino'},{l:'Q',emoji:'🧀',name:'Queso'},{l:'R',emoji:'🐸',name:'Rana'},
  {l:'S',emoji:'🐍',name:'Serpiente'},{l:'T',emoji:'🐢',name:'Tortuga'},{l:'U',emoji:'🦄',name:'Unicornio'},
  {l:'V',emoji:'🐄',name:'Vaca'},{l:'W',emoji:'🐺',name:'Wombat'},{l:'X',emoji:'🎸',name:'Xilofono'},
  {l:'Y',emoji:'🦬',name:'Yak'},{l:'Z',emoji:'🦊',name:'Zorro'},
];
const COUNT_EMOJIS=['⭐','❤️','🌸','🦋','🎈'];
const PAW_PATROL=[
  {name:'Chase',img:'paw/chase.jpg'},
  {name:'Marshall',img:'paw/marshall.jpg'},
  {name:'Skye',img:'paw/skye.jpg'},

  {word:'EVEREST',emoji:'🐾',hint:'perrita de la nieve',paw:true},

const LEVELS=[
  {name:'Vocales',emoji:'\u{1F170}\uFE0F',desc:'Solo vocales',chars:'AEIOU',nums:false,words:false,opts:3},
  {name:'Letras',emoji:'\u{1F524}',desc:'Todas las letras',chars:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',nums:false,words:true,opts:4},
  {name:'Numeros',emoji:'\u{1F522}',desc:'Numeros del 1 al 9',chars:'',nums:true,words:false,opts:4},
  {name:'Mezcla',emoji:'\u2B50',desc:'Letras y numeros',chars:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',nums:true,words:true,opts:5},
  {name:'Campeon',emoji:'\u{1F3C6}',desc:'Todo mas dificil',chars:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',nums:true,words:true,opts:6},
];
const MSGS_OK=['BIEN!','GENIAL!','SUPER!','BRAVO!','PERFECTO!'];
const MSGS_RETRY=['Otra vez!','Intenta!','Casi!'];

// === PLAYER ===
const player=sessionStorage.getItem('jugadora')||'';
if(player){
  const w=document.getElementById('welcomeMsg');
  if(w)w.textContent='Hola '+player+'!';
}

// === STATE ===
let stars=0,streak=0,currentRound=null,locked=false,focusIdx=0;
let currentLevel=null,levelFocus=0;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  const backBtn=document.querySelector('.back-btn');
  const levelsBtn=document.getElementById('levelsBtn');
  if(id==='game-screen'){backBtn.style.display='none';levelsBtn.style.display='block';}
  else{backBtn.style.display='block';levelsBtn.style.display='none';}
}

function goPlay(){initAudio();sndClick();show('level-screen');buildLevelGrid();startMusic()}
document.getElementById('playBtn').onclick=goPlay;
window._titleKey=e=>{if(e.key==='Enter'){e.preventDefault();goPlay();window.removeEventListener('keydown',window._titleKey)}};
window.addEventListener('keydown',window._titleKey);

// === LEVEL SCREEN ===
function buildLevelGrid(){
  const grid=document.getElementById('levelGrid');
  const title=document.querySelector('.level-title');
  title.textContent=player?('Elige nivel, '+player+'!'):'Elige nivel';
  grid.innerHTML=LEVELS.map((lv,i)=>
    '<div class="level-card'+(i===levelFocus?' selected':'')+'" data-idx="'+i+'">'+
    '<span class="lnum">'+(i+1)+'</span>'+
    '<span class="lemoji">'+lv.emoji+'</span>'+
    '<span class="lname">'+lv.name+'</span>'+
    '<span class="ldesc">'+lv.desc+'</span>'+
    '</div>'
  ).join('');
  document.querySelectorAll('.level-card').forEach(c=>{
    c.onclick=()=>{sndClick();selectLevel(parseInt(c.dataset.idx))};
  });
}

function highlightLevel(i){
  levelFocus=((i%LEVELS.length)+LEVELS.length)%LEVELS.length;
  document.querySelectorAll('.level-card').forEach((c,j)=>c.classList.toggle('selected',j===levelFocus));
}

function selectLevel(idx){
  currentLevel=LEVELS[idx];
  show('game-screen');
  nextRound();
}

// === LEVELS BUTTON (from game back to level select) ===
document.getElementById('levelsBtn').onclick=()=>{sndClick();stopSpeech();show('level-screen');buildLevelGrid()};

// === ROUND GENERATOR ===
function nextRound(){
  locked=false;focusIdx=0;stopSpeech();
  // Build list of available round types based on current level
  const lv=currentLevel;
  const types=[];
  // roundFindChar and roundType work with both letters and numbers
  if(lv.chars||lv.nums){types.push('find');types.push('type')}
  // roundAssociate works with both letters (emoji->initial) and numbers (counting)
  if(lv.chars||lv.nums)types.push('assoc');
  // roundCompleteWord only if words enabled
  if(lv.words)types.push('complete');
  const pick=types[Math.floor(Math.random()*types.length)];
  if(pick==='find') roundFindChar();
  else if(pick==='assoc') roundAssociate();
  else if(pick==='type') roundType();
  else roundCompleteWord();
  highlightOpt(0);
}

// --- Round 1: Find the letter/number ---
function roundFindChar(){
  const lv=currentLevel;
  const numOpts=lv.opts-1; // number of distractors
  // decide if this round shows a number or a letter
  const canLetter=!!lv.chars;
  const canNum=lv.nums;
  const isNum=canNum&&(!canLetter||Math.random()<.4);
  let target,distractors;
  if(isNum){
    target=String(Math.floor(Math.random()*9)+1);
    distractors=[];
    while(distractors.length<numOpts){
      const d=String(Math.floor(Math.random()*9)+1);
      if(d!==target&&!distractors.includes(d))distractors.push(d);
    }
  } else {
    const chars=lv.chars;
    const pool=LETTERS.filter(x=>chars.includes(x.l));
    const item=pool[Math.floor(Math.random()*pool.length)];
    target=item.l;
    distractors=[];
    while(distractors.length<numOpts){
      const d=pool[Math.floor(Math.random()*pool.length)].l;
      if(d!==target&&!distractors.includes(d))distractors.push(d);
    }
  }
  const opts=shuffle([target,...distractors]);
  currentRound={type:'find',answer:target,opts};
  renderFind(target,opts,isNum);
}

// --- Round 2: Associate emoji with initial ---
function roundAssociate(){
  const lv=currentLevel;
  const numOpts=lv.opts-1;
  const canLetter=!!lv.chars;
  const canNum=lv.nums;
  const isNum=canNum&&(!canLetter||Math.random()<.4);
  if(isNum){
    const n=Math.floor(Math.random()*5)+1;
    const usePaw=Math.random()<0.3;
    let display;
    if(usePaw){
      const pw=PAW_PATROL[Math.floor(Math.random()*PAW_PATROL.length)];
      display=Array(n).fill('<img class="paw-img" src="'+pw.img+'" alt="'+pw.name+'">').join('');
    } else {
      const emo=COUNT_EMOJIS[Math.floor(Math.random()*COUNT_EMOJIS.length)];
      display=Array(n).fill('<span>'+emo+'</span>').join('');
    }
    const answer=String(n);
    const distractors=[];
    while(distractors.length<numOpts){
      const d=String(Math.floor(Math.random()*8)+1);
      if(d!==answer&&!distractors.includes(d))distractors.push(d);
    }
    const opts=shuffle([answer,...distractors]);
    currentRound={type:'assoc',answer,opts};
    renderAssocNum(display,n,opts);
  } else {
    const chars=lv.chars;
    const pool=LETTERS.filter(x=>chars.includes(x.l));
    const item=pool[Math.floor(Math.random()*pool.length)];
    const answer=item.l;
    const distractors=[];
    while(distractors.length<numOpts){
      const d=pool[Math.floor(Math.random()*pool.length)].l;
      if(d!==answer&&!distractors.includes(d))distractors.push(d);
    }
    const opts=shuffle([answer,...distractors]);
    currentRound={type:'assoc',answer,opts};
    renderAssocLetter(item,opts);
  }
}

// --- Round 3: Type the character ---
function roundType(){
  const lv=currentLevel;
  const numOpts=lv.opts-1;
  const canLetter=!!lv.chars;
  const canNum=lv.nums;
  const isNum=canNum&&(!canLetter||Math.random()<.4);
  let target;
  if(isNum){
    target=String(Math.floor(Math.random()*9)+1);
  } else {
    const chars=lv.chars;
    const pool=LETTERS.filter(x=>chars.includes(x.l));
    target=pool[Math.floor(Math.random()*pool.length)].l;
  }
  // on touch devices show options instead of requiring keyboard
  const isTouch='ontouchstart' in window && !window.matchMedia('(pointer:fine)').matches;
  if(isTouch){
    const distractors=[];
    if(isNum){
      while(distractors.length<numOpts){const d=String(Math.floor(Math.random()*9)+1);if(d!==target&&!distractors.includes(d))distractors.push(d)}
    } else {
      const chars=lv.chars;
      const pool=LETTERS.filter(x=>chars.includes(x.l));
      while(distractors.length<numOpts){const d=pool[Math.floor(Math.random()*pool.length)].l;if(d!==target&&!distractors.includes(d))distractors.push(d)}
    }
    const opts=shuffle([target,...distractors]);
    currentRound={type:'find',answer:target,opts};
    renderType(target,opts,true);
  } else {
    currentRound={type:'type',answer:target,opts:null};
    renderType(target,null,false);
  }
}

// --- Round 4: Complete the word (missing letter) ---
function roundCompleteWord(){
  const lv=currentLevel;
  const numOpts=lv.opts-1;
  const item=WORDS[Math.floor(Math.random()*WORDS.length)];
  const word=item.word;
  const pos=Math.floor(Math.random()*word.length);
  const answer=word[pos];
  const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const distractors=[];
  while(distractors.length<numOpts){
    const d=ALPHA[Math.floor(Math.random()*26)];
    if(d!==answer&&!distractors.includes(d))distractors.push(d);
  }
  const opts=shuffle([answer,...distractors]);
  currentRound={type:'complete',answer,opts,word,pos,emoji:item.emoji,hint:item.hint,paw:item.paw};
  renderCompleteWord(currentRound);
}

// === RENDERERS ===
function renderFind(target,opts,isNum){
  const area=document.getElementById('gameArea');
  area.innerHTML=`
    <div class="prompt">${isNum?'Encuentra el numero':'Encuentra la letra'}</div>
    <div class="big-char">${target}</div>
    <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
  `;
  bindOpts();
  speak(isNum?'Encuentra el numero '+target:'Encuentra la letra '+target);
}

function renderAssocLetter(item,opts){
  const area=document.getElementById('gameArea');
  area.innerHTML=`
    <div class="prompt">Cual es la primera letra?</div>
    <div class="emoji-display">${item.emoji}</div>
    <div class="emoji-name">${item.name}</div>
    <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
  `;
  bindOpts();
  speak(item.name+'. Cual es la primera letra de '+item.name+'?');
}

function renderAssocNum(display,n,opts){
  const area=document.getElementById('gameArea');
  area.innerHTML=`
    <div class="prompt">Cuantos hay?</div>
    <div class="count-emojis">${display}</div>
    <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
  `;
  bindOpts();
  speak('Cuantos hay?');
}

function renderType(target,opts,touchMode){
  const area=document.getElementById('gameArea');
  const isNum=target.match(/[0-9]/);
  if(touchMode){
    area.innerHTML=`
      <div class="prompt">Toca la correcta</div>
      <div class="big-char">${target}</div>
      <div class="options" id="opts">${opts.map((o,i)=>`<button class="opt-btn" data-val="${o}" data-idx="${i}">${o}</button>`).join('')}</div>
    `;
    bindOpts();
  } else {
    area.innerHTML=`
      <div class="prompt">Presiona esta tecla!</div>
      <div class="big-char">${target}</div>
      <div class="type-hint">Usa el teclado</div>
    `;
  }
  speak(isNum?'Presiona el numero '+target:'Presiona la letra '+target);
}

function renderCompleteWord(r){
  const area=document.getElementById('gameArea');
  let wordHtml='';
  for(let i=0;i<r.word.length;i++){
    if(i===r.pos){
      wordHtml+='<span class="word-letter word-gap">_</span>';
    } else {
      wordHtml+='<span class="word-letter">'+r.word[i]+'</span>';
    }
  }
  const pawBadge=r.paw?'<div class="paw-badge">🐾 Paw Patrol</div>':'';
  let emojiHtml;
  if(r.paw){
    const pw=PAW_PATROL.find(function(p){return p.name.toUpperCase()===r.word.toUpperCase()});
    emojiHtml=pw?'<img class="paw-display" src="'+pw.img+'" alt="'+pw.name+'">':'<span class="emoji-display">'+r.emoji+'</span>';
  } else {
    emojiHtml='<span class="emoji-display">'+r.emoji+'</span>';
  }
  area.innerHTML=
    '<div class="prompt">Que letra falta?</div>'+
    emojiHtml+
    '<div class="word-hint">'+r.hint+pawBadge+'</div>'+
    '<div class="word-display">'+wordHtml+'</div>'+
    '<div class="options" id="opts">'+r.opts.map(function(o,i){return '<button class="opt-btn" data-val="'+o+'" data-idx="'+i+'">'+o+'</button>'}).join('')+'</div>';
  bindOpts();
  const name=player?', '+player:'';
  speak('Que letra falta en '+r.word+'?'+name);
}

// === OPTION BINDING ===
function bindOpts(){
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.onclick=()=>checkAnswer(btn.dataset.val,parseInt(btn.dataset.idx));
  });
}

function highlightOpt(i){
  const btns=document.querySelectorAll('.opt-btn');
  if(!btns.length)return;
  focusIdx=((i%btns.length)+btns.length)%btns.length;
  btns.forEach((b,j)=>b.classList.toggle('selected',j===focusIdx));
}

function checkAnswer(val,idx){
  if(locked)return;
  const btn=document.querySelectorAll('.opt-btn')[idx];
  if(val===currentRound.answer){
    locked=true;
    btn.classList.add('correct');
    sndCorrect();
    stars++;streak++;
    document.getElementById('starCount').textContent='⭐ '+stars;
    showFeedback(MSGS_OK[Math.floor(Math.random()*MSGS_OK.length)],false);
    spawnStars(btn);
    if(streak%5===0)spawnConf();
    setTimeout(nextRound,2200);
  } else {
    btn.classList.add('wrong');
    sndWrong();
    streak=0;
    showFeedback(MSGS_RETRY[Math.floor(Math.random()*MSGS_RETRY.length)],true);
    // highlight correct answer
    setTimeout(()=>{
      btn.classList.remove('wrong');
      document.querySelectorAll('.opt-btn').forEach(b=>{
        if(b.dataset.val===currentRound.answer)b.classList.add('hint');
      });
    },500);
  }
}

// === KEYBOARD HANDLER ===
window.addEventListener('keydown',e=>{
  // Level screen navigation
  if(!document.getElementById('level-screen').classList.contains('hidden')){
    if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();highlightLevel(levelFocus+1)}
    else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();highlightLevel(levelFocus-1)}
    else if(e.key==='Enter'){e.preventDefault();sndClick();selectLevel(levelFocus)}
    else if(e.key>='1'&&e.key<='5'){e.preventDefault();sndClick();selectLevel(parseInt(e.key)-1)}
    else if(e.key==='Escape'){e.preventDefault();show('title-screen')}
    return;
  }

  // Game screen
  if(!document.getElementById('game-screen').classList.contains('hidden')){
    if(e.key==='Escape'){e.preventDefault();sndClick();stopSpeech();show('level-screen');buildLevelGrid();return}
    if(locked)return;
    const btns=document.querySelectorAll('.opt-btn');

    if(currentRound&&currentRound.type==='type'&&!currentRound.opts){
      // direct key input mode
      const key=e.key.toUpperCase();
      if(key===currentRound.answer){
        locked=true;sndCorrect();stars++;streak++;
        document.getElementById('starCount').textContent='⭐ '+stars;
        showFeedback(MSGS_OK[Math.floor(Math.random()*MSGS_OK.length)],false);
        if(streak%5===0)spawnConf();
        const bc=document.querySelector('.big-char');
        if(bc)bc.style.color='#66BB6A';
        setTimeout(nextRound,2200);
      } else if(key.length===1&&key.match(/[A-Z0-9]/)){
        sndWrong();streak=0;
        showFeedback(MSGS_RETRY[Math.floor(Math.random()*MSGS_RETRY.length)],true);
      }
      return;
    }

    // arrow navigation for option buttons
    if(btns.length){
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();highlightOpt(focusIdx+1)}
      if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();highlightOpt(focusIdx-1)}
      if(e.key==='Enter'){e.preventDefault();const b=btns[focusIdx];if(b)checkAnswer(b.dataset.val,focusIdx)}
      // direct letter/number press to select matching option
      const key=e.key.toUpperCase();
      btns.forEach((b,i)=>{if(b.dataset.val===key)checkAnswer(key,i)});
    }
    return;
  }
});

// === FEEDBACK ===
let fbTimer=null;
function showFeedback(msg,isRetry){
  const fb=document.getElementById('feedback');
  const txt=document.getElementById('fbText');
  if(fbTimer)clearTimeout(fbTimer);
  txt.textContent=msg;
  txt.className='fb-text'+(isRetry?' retry':'');
  fb.classList.remove('hidden');
  txt.style.animation='none';void txt.offsetWidth;txt.style.animation='fbPop .6s cubic-bezier(.34,1.56,.64,1) forwards';
  fbTimer=setTimeout(()=>{fb.classList.add('hidden');fbTimer=null},isRetry?700:900);
  const name=player?', '+player:'';
  stopSpeech();speak(isRetry?'Intenta otra vez'+name:msg.replace('!','')+name);
}

function spawnStars(btn){
  const rect=btn.getBoundingClientRect();
  for(let i=0;i<5;i++){
    const s=document.createElement('div');s.className='star-particle';
    s.textContent='⭐';
    s.style.left=(rect.left+rect.width/2-16+Math.random()*40-20)+'px';
    s.style.top=(rect.top-10)+'px';
    s.style.animationDelay=(i*.08)+'s';
    document.body.appendChild(s);setTimeout(()=>s.remove(),1200);
  }
}

function spawnConf(){
  sndCeleb();
  const cols=['#FF6B9D','#FFD54F','#4FC3F7','#66BB6A','#CE93D8','#FF8A65','#EF5350'];
  for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confetti';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;background:${cols[i%7]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),6000)}
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
